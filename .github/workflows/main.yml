name: Build mipsel binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build for mipsel
        env:
          GOOS: linux
          GOARCH: mipsle
          GOMIPS: softfloat
        run: |
          go build -o amneziawg-go-mipsle .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-go-mipsle
          path: amneziawg-go-mipsle
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: mipsle-build
          files: amneziawg-go-mipsle
          generate_release_notes: false
